<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1 class="title">Welcome to My Portfolio</h1>
        </section>
        <div class="content">
            <div class="card" id="interactive-card">
                <h2 class="card-title">Project Title</h2>
                <p class="card-description">Description of the project goes here. Click for more details!</p>
            </div>
        </div>
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <script>
        // GSAP animations for 3D effects and scroll interactions
        gsap.registerPlugin();

        // Example of letter-by-letter reveal
        const title = document.querySelector('.title');
        const text = title.textContent;
        title.textContent = '';
        text.split('').forEach((char, index) => {
            gsap.fromTo(title, { opacity: 0 }, { opacity: 1, delay: index * 0.1, duration: 0.5 });
        });

        // Scroll progress
        window.addEventListener('scroll', () => {
            const scrollPosition = window.scrollY;
            const pageHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = (scrollPosition / pageHeight) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        });
    </script>
</body>
</html>
